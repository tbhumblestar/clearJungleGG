spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        auto_quote_keyword: true
  sql:
    init:
      mode: always

riot:
  api-key: test-api-key
  kr-base-url: http://localhost
  asia-base-url: http://localhost
  ddragon-base-url: http://localhost
